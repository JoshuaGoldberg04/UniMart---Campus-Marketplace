<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — UniMart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .auth-step { display: none; }
    .auth-step.active { display: block; }
    .password-strength { height: 4px; border-radius: 2px; background: var(--border); margin-top: 6px; overflow: hidden; }
    .password-strength-bar { height: 100%; border-radius: 2px; transition: width .3s, background .3s; width: 0; }
  </style>
</head>
<body class="auth-page">
 
  <div class="auth-card">
 
    <!-- Logo -->
    <div class="auth-logo">
  <img src="unimart-logo.png" alt="UniMart Logo" class="logo-img" />
</div>
 
    <!-- ===== STEP 1 — Account details ===== -->
    <div id="step-details" class="auth-step active">
      <div class="auth-header">
        <h1>Create your account</h1>
        <p>Join your campus marketplace today</p>
      </div>
 
      <form class="auth-form" id="signup-form" novalidate>
 
        <div class="form-group">
          <label class="form-label" for="full-name">Full name</label>
          <input class="form-input" id="full-name" type="text" placeholder="Jane Smith" autocomplete="name" required />
          <span class="form-error" id="name-error"></span>
        </div>
 
        <div class="form-group">
          <label class="form-label" for="signup-email">University email</label>
          <input class="form-input" id="signup-email" type="email" placeholder="you@university.edu" autocomplete="email" required />
          <span class="form-error" id="email-error"></span>
        </div>
 
        <div class="form-group">
          <label class="form-label" for="signup-password">Password</label>
          <div class="input-wrapper">
            <input class="form-input" id="signup-password" type="password" placeholder="At least 8 characters" autocomplete="new-password" required />
            <button type="button" class="input-toggle" id="pw-toggle" aria-label="Toggle password visibility"></button>
          </div>
          <div class="password-strength">
            <div class="password-strength-bar" id="pw-strength-bar"></div>
          </div>
          <span class="form-error" id="password-error"></span>
        </div>
 
        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm password</label>
          <div class="input-wrapper">
            <input class="form-input" id="confirm-password" type="password" placeholder="Re-enter your password" autocomplete="new-password" required />
            <button type="button" class="input-toggle" id="confirm-pw-toggle" aria-label="Toggle password visibility"></button>
          </div>
          <span class="form-error" id="confirm-error"></span>
        </div>
 
        <div class="form-group">
          <label class="form-label">Account type</label>
          <div class="account-type-group" id="account-type-group">
 
            <label class="account-type-option" id="opt-buyer">
              <input type="radio" name="account-type" value="buyer" />
              <div class="account-type-radio"></div>
              <div class="account-type-info">
                <strong>Buyer Only</strong>
                <span>Browse and purchase items from other students</span>
              </div>
            </label>
 
            <label class="account-type-option" id="opt-seller-buyer">
              <input type="radio" name="account-type" value="seller_buyer" />
              <div class="account-type-radio"></div>
              <div class="account-type-info">
                <strong>Seller / Buyer</strong>
                <span>List items for sale and buy from others</span>
              </div>
            </label>
 
          </div>
          <span class="form-error" id="type-error"></span>
        </div>
 
        <div class="form-group">
          <label class="form-label">University <span style="font-weight:400; color:var(--muted); font-size:.75rem;">(optional)</span></label>
          <input class="form-input" id="signup-university" type="text" placeholder="e.g. University of Cape Town" />
        </div>
 
        <div class="auth-form-grid">
          <div class="form-group">
            <label class="form-label">Campus <span style="font-weight:400; color:var(--muted); font-size:.75rem;">(optional)</span></label>
            <input class="form-input" id="signup-campus" type="text" placeholder="e.g. Upper Campus" />
          </div>
          <div class="form-group">
            <label class="form-label">Student number <span style="font-weight:400; color:var(--muted); font-size:.75rem;">(optional)</span></label>
            <input class="form-input" id="signup-student-number" type="text" placeholder="e.g. SMTJSH001" />
          </div>
        </div>
 
        <div class="form-error" id="signup-error" style="text-align:center; font-size:.85rem;"></div>
 
        <button type="submit" class="btn btn-primary btn-full btn-lg auth-form-submit" id="signup-btn">
          Create account
        </button>
      </form>
 
      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
 
    <!-- ===== STEP 2 — Email Verification ===== -->
    <div id="step-verify" class="auth-step">
        <div style="display:flex; flex-direction:column; align-items:center; text-align:center;">
        <div class="verify-icon"><span class="ui-icon ui-icon-lg"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="14" height="10" rx="2"/><path d="m4.5 6.5 5.5 4 5.5-4" stroke-linecap="round" stroke-linejoin="round"/></svg></span></div>
        <h2 style="margin-bottom:8px;">Verify your email</h2>
        <p style="max-width:300px; margin-bottom:24px;">
          We've sent an 8-digit code to<br/>
          <strong id="verify-email-display" style="color:var(--ink)"></strong>
        </p>
 
        <form class="auth-form" id="verify-form" novalidate style="width:100%">
          <div class="otp-input-group">
            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]" />
            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]" />
            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]" />
            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]" />
            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]" />
            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]" />
            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]" />
            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]" />
          </div>
 
          <div class="form-error" id="otp-error" style="text-align:center; font-size:.85rem; margin-top:4px;"></div>
 
          <button type="submit" class="btn btn-primary btn-full btn-lg" id="verify-btn" style="margin-top:8px;">
            Verify &amp; Continue
          </button>
        </form>
 
        <div class="resend-link" style="margin-top:16px;">
          Didn't get it? <a id="resend-btn" style="cursor:pointer;">Resend code</a>
        </div>
        <div style="margin-top:12px;">
          <button type="button" class="btn btn-ghost btn-sm" id="back-btn"><span class="inline-action-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M11.5 5 6.5 10l5 5" stroke-linecap="round" stroke-linejoin="round"/></svg></span> Edit details</button>
        </div>
      </div>
    </div>
 
    <!-- ===== STEP 3 — Success ===== -->
    <div id="step-success" class="auth-step">
        <div style="display:flex; flex-direction:column; align-items:center; text-align:center; padding:20px 0;">
        <div class="verify-icon" style="background:var(--mint);"><span class="ui-icon ui-icon-lg"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 14.5 8.5 8l5 5-6.5 1.5Z" stroke-linejoin="round"/><path d="m11.5 6.5 2-2M13.5 8.5h3M12.5 10.5l2 2" stroke-linecap="round"/></svg></span></div>
        <h2 style="margin-bottom:8px;">Account created!</h2>
        <p style="max-width:280px; margin-bottom:28px;">
          Welcome to UniMart. Your account has been verified and you're ready to go.
        </p>
        <a href="search.html" class="btn btn-primary btn-lg">Go to marketplace <span class="inline-action-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m8.5 5 5 5-5 5" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>
      </div>
    </div>
 
  </div><!-- /auth-card -->
 
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="auth.js"></script>
  <script>
    // Redirect if already logged in
    Auth.getUser().then(user => { if (user) window.location.href = 'search.html'; });
 
    let pendingEmail = '';
 
    /* ---- Account type selection ---- */
    document.querySelectorAll('.account-type-option').forEach(opt => {
      opt.addEventListener('click', function () {
        document.querySelectorAll('.account-type-option').forEach(o => o.classList.remove('selected'));
        this.classList.add('selected');
        this.querySelector('input[type="radio"]').checked = true;
      });
    });
 
    /* ---- Password toggles ---- */
    const passwordToggleIcons = {
      hidden: '<span class="ui-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2.5 10s2.75-4.5 7.5-4.5 7.5 4.5 7.5 4.5-2.75 4.5-7.5 4.5S2.5 10 2.5 10Z"/><circle cx="10" cy="10" r="2.25"/></svg></span>',
      visible: '<span class="ui-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 3l14 14" stroke-linecap="round"/><path d="M8.7 5.8A8.5 8.5 0 0 1 10 5.5c4.75 0 7.5 4.5 7.5 4.5a14.4 14.4 0 0 1-2.55 2.9"/><path d="M11.8 11.9A2.25 2.25 0 0 1 8.1 8.2"/><path d="M6.1 6.2C4 7.4 2.5 10 2.5 10s2.75 4.5 7.5 4.5c1.1 0 2.08-.24 2.95-.62" stroke-linecap="round"/></svg></span>'
    };

    function makeToggle(btnId, inputId) {
      const btn = document.getElementById(btnId);
      btn.innerHTML = passwordToggleIcons.hidden;
      btn.addEventListener('click', function () {
        const inp = document.getElementById(inputId);
        inp.type  = inp.type === 'password' ? 'text' : 'password';
        this.innerHTML = inp.type === 'password' ? passwordToggleIcons.hidden : passwordToggleIcons.visible;
      });
    }
    makeToggle('pw-toggle', 'signup-password');
    makeToggle('confirm-pw-toggle', 'confirm-password');
 
    /* ---- Password strength ---- */
    document.getElementById('signup-password').addEventListener('input', function () {
      const val = this.value;
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const bar = document.getElementById('pw-strength-bar');
      const colours = ['', '#c0392b', '#e67e22', '#f1c40f', '#27ae60'];
      bar.style.width = (score / 4 * 100) + '%';
      bar.style.background = colours[score] || 'transparent';
    });
 
    /* ---- Sign up form ---- */
    document.getElementById('signup-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      clearErrors();
 
      const fullName    = document.getElementById('full-name').value.trim();
      const email       = document.getElementById('signup-email').value.trim();
      const password    = document.getElementById('signup-password').value;
      const confirm     = document.getElementById('confirm-password').value;
      const accountType   = document.querySelector('input[name="account-type"]:checked')?.value;
      const university    = document.getElementById('signup-university').value.trim();
      const campus        = document.getElementById('signup-campus').value.trim();
      const studentNumber = document.getElementById('signup-student-number').value.trim();
      let valid = true;
 
      if (!fullName) { showError('name-error', 'Full name is required.'); valid = false; }
      if (!email) { showError('email-error', 'Email is required.'); valid = false; }
      else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('email-error', 'Enter a valid email.'); valid = false; }
      if (!password) { showError('password-error', 'Password is required.'); valid = false; }
      else if (password.length < 8) { showError('password-error', 'Password must be at least 8 characters.'); valid = false; }
      if (password !== confirm) { showError('confirm-error', 'Passwords do not match.'); valid = false; }
      if (!accountType) { showError('type-error', 'Please select an account type.'); valid = false; }
      if (!valid) return;
 
      const btn = document.getElementById('signup-btn');
      btn.textContent = 'Creating account…';
      btn.disabled = true;
 
      const result = await Auth.signUp({ fullName, email, password, accountType, university, campus, studentNumber });
 
      btn.textContent = 'Create account';
      btn.disabled = false;
 
      if (result.error) { showError('signup-error', result.error); return; }
 
      pendingEmail = email;
      document.getElementById('verify-email-display').textContent = email;
      showStep('verify');
      document.querySelector('.otp-input').focus();
    });
 
    /* ---- OTP inputs ---- */
    const otpInputs = document.querySelectorAll('.otp-input');
    otpInputs.forEach((input, i) => {
      input.addEventListener('input', function () {
        this.value = this.value.replace(/\D/g, '');
        if (this.value && i < otpInputs.length - 1) otpInputs[i + 1].focus();
      });
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Backspace' && !this.value && i > 0) otpInputs[i - 1].focus();
      });
      input.addEventListener('paste', function (e) {
        e.preventDefault();
        const text = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 8);
        text.split('').forEach((ch, j) => { if (otpInputs[j]) otpInputs[j].value = ch; });
        const next = otpInputs[Math.min(text.length, 7)];
        if (next) next.focus();
      });
    });
 
    /* ---- Verify form ---- */
    document.getElementById('verify-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const code = Array.from(otpInputs).map(i => i.value).join('');
      if (code.length < 8) { showError('otp-error', 'Please enter all 8 digits.'); return; }
 
      const btn = document.getElementById('verify-btn');
      btn.textContent = 'Verifying…';
      btn.disabled = true;
 
      const result = await Auth.verifyOTP(pendingEmail, code);
 
      btn.textContent = 'Verify & Continue';
      btn.disabled = false;
 
      if (result.error) { showError('otp-error', result.error); return; }
 
      showStep('success');
    });
 
    /* ---- Resend ---- */
    document.getElementById('resend-btn').addEventListener('click', async () => {
      if (!pendingEmail) return;
      await Auth.signUp({ fullName: '', email: pendingEmail, password: '', accountType: '' });
      showToastMini('A new code has been sent to your email.');
    });
 
    /* ---- Back ---- */
    document.getElementById('back-btn').addEventListener('click', () => {
      otpInputs.forEach(i => i.value = '');
      clearErrors();
      showStep('details');
    });
 
    /* ---- Step helper ---- */
    function showStep(name) {
      document.querySelectorAll('.auth-step').forEach(s => s.classList.remove('active'));
      document.getElementById('step-' + name).classList.add('active');
    }
 
    /* ---- Error helpers ---- */
    function clearErrors() {
      document.querySelectorAll('.form-error').forEach(el => {
        el.textContent = '';
        el.classList.remove('visible');
      });
    }
    function showError(id, msg) {
      const el = document.getElementById(id);
      if (el) { el.textContent = msg; el.classList.add('visible'); }
    }
    function showToastMini(msg) {
      const t = document.createElement('div');
      t.style.cssText = 'position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;padding:10px 16px;border-radius:8px;font-size:.85rem;z-index:999;';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3500);
    }
  </script>
</body>
</html>
