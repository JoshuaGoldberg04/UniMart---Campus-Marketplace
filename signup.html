<!-- Step 1: choose account type -->
<div id="step-type" class="auth-step active">
<div class="auth-header">
<h1>Create account</h1>
<p>What best describes you?</p>
</div>
<div class="account-type-group">
<label class="account-type-option" id="opt-buyer">
<input type="radio" name="account-type"
value="buyer" style="display:none" />
<div>
<strong>Buyer</strong>
<p>Browse and buy items from other students</p>
</div>
</label>
<label class="account-type-option" id="opt-seller">
<input type="radio" name="account-type"
value="seller_buyer" style="display:none" />
<div>
<strong>Seller / Buyer</strong>
<p>List items for sale and browse the marketplace</p>
</div>
</label>
</div>
<button id="next-type-btn" class="btn btn-primary btn-full btn-lg"
style="margin-top:20px" disabled>Continue</button>
</div>

<!-- Step 2: personal + campus details -->
<div id="step-details" class="auth-step">
<form class="auth-form" id="signup-form" novalidate>
<div class="auth-form-grid">
<div class="form-group">
<label class="form-label">Full name</label>
<input class="form-input" id="su-name" type="text"
placeholder="Your full name" required />
<span class="form-error" id="name-error"></span>
</div>
<div class="form-group">
<label class="form-label">Email address</label>
<input class="form-input" id="su-email" type="email"
placeholder="you@university.edu" required />
<span class="form-error" id="su-email-error"></span>
</div>
</div>
<div class="form-group">
<label class="form-label">Password</label>
<div class="input-wrapper">
<input class="form-input" id="su-password" type="password"
placeholder="Minimum 8 characters" required />
<button type="button" class="input-toggle" id="su-pw-toggle"></button>
</div>
<span class="form-error" id="su-pw-error"></span>
</div>
<div class="form-group">
<label class="form-label">University (optional)</label>
<input class="form-input" id="su-uni" type="text"
placeholder="e.g. University of Pretoria" />
</div>
<div class="auth-form-grid">
<div class="form-group">
<label class="form-label">Campus (optional)</label>
<input class="form-input" id="su-campus" type="text"
placeholder="e.g. Hatfield" />
</div>
<div class="form-group">
<label class="form-label">Student number (optional)</label>
<input class="form-input" id="su-student" type="text"
placeholder="e.g. u12345678" />
</div>
</div>
<div class="form-error" id="su-general-error"
style="text-align:center"></div>
<button type="submit" class="btn btn-primary btn-full btn-lg"
id="signup-btn">Create account</button>
</form>
</div>

<!-- Step 3: email OTP confirmation -->
<div id="step-otp" class="auth-step">
<div style="text-align:center; margin-bottom:20px">
<div class="verify-icon">
<span class="ui-icon ui-icon-lg">
<svg viewBox="0 0 20 20" ...envelope icon.../>
</span>
</div>
<h1 style="margin-bottom:6px">Verify your email</h1>
<p id="otp-email-hint">
Enter the 6-digit code sent to your email address.
</p>
</div>
<div class="otp-input-group" id="otp-inputs">
<input class="otp-input" maxlength="1" type="text"
inputmode="numeric" pattern="[0-9]" />
<!-- × 6 inputs -->
</div>
<div class="form-error" id="otp-error"
style="text-align:center;margin-top:8px"></div>
<button class="btn btn-primary btn-full btn-lg"
id="verify-btn" style="margin-top:16px" disabled>Verify</button>
<div class="auth-footer">
Didn't receive a code?
<a href="#" id="resend-link">Resend</a>
</div>
</div>

<script>
let selectedType = null;
let signupEmail = '';
/* ---- Step 1: account type ---- */
document.querySelectorAll('.account-type-option').forEach(opt => {
opt.addEventListener('click', () => {
document.querySelectorAll('.account-type-option')
.forEach(o => o.classList.remove('selected'));
opt.classList.add('selected');
selectedType = opt.querySelector('input').value;
document.getElementById('next-type-btn').disabled = false;
});
});
document.getElementById('next-type-btn').addEventListener('click', () => {
showStep('step-details');
});
/* ---- Step 2: form submit ---- */
document.getElementById('signup-form')
.addEventListener('submit', async function (e) {
e.preventDefault();
clearErrors();
const fullName = document.getElementById('su-name').value.trim();
const email = document.getElementById('su-email').value.trim();
const password = document.getElementById('su-password').value;
const university = document.getElementById('su-uni').value.trim();
const campus = document.getElementById('su-campus').value.trim();
const studentNumber = document.getElementById('su-student').value.trim();
let valid = true;
if (!fullName) { showError('name-error', 'Name is required.'); valid=false; }
if (!email) { showError('su-email-error', 'Email required.'); valid=false; }
if (password.length < 8)
{ showError('su-pw-error', 'Min 8 characters.'); valid=false; }
if (!valid) return;
const btn = document.getElementById('signup-btn');
btn.textContent = 'Creating account…'; btn.disabled = true;
const result = await Auth.signUp({
fullName, email, password,
accountType: selectedType,
university, campus, studentNumber,
});
btn.textContent = 'Create account'; btn.disabled = false;
if (result.error) { showError('su-general-error', result.error); return; }
signupEmail = email;
document.getElementById('otp-email-hint').textContent =
`Enter the 6-digit code sent to ${email}`;
showStep('step-otp');
});
/* ---- Step 3: OTP auto-advance ---- */
const otpBoxes = document.querySelectorAll('.otp-input');
otpBoxes.forEach((box, i) => {
box.addEventListener('input', () => {
if (box.value && i < otpBoxes.length - 1) otpBoxes[i+1].focus();
const code = [...otpBoxes].map(b => b.value).join('');
document.getElementById('verify-btn').disabled = code.length < 6;
});
box.addEventListener('keydown', e => {
if (e.key === 'Backspace' && !box.value && i > 0) otpBoxes[i-1].focus();
});
});
document.getElementById('verify-btn')
.addEventListener('click', async () => {
const code = [...otpBoxes].map(b => b.value).join('');
const result = await Auth.verifyOTP(signupEmail, code);
if (result.error) {
document.getElementById('otp-error').textContent = result.error;
return;
}
window.location.href = 'search.html';
});
function showStep(id) {
document.querySelectorAll('.auth-step')
.forEach(s => s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}
</script>
