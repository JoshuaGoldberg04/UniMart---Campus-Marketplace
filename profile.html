<!-- Tab navigation -->
<div class="profile-tabs">
<button class="tab-btn active" data-tab="personal">Personal Info</button>
<button class="tab-btn" data-tab="campus">Campus Info</button>
<button class="tab-btn" data-tab="security">Security</button>
</div>
<!-- Personal Info -->
<div class="tab-panel active" id="tab-personal">
<div class="settings-card">
<div class="form-group">
<label class="form-label">Full name</label>
<input class="form-input" id="p-name" type="text" />
</div>
<div class="form-group">
<label class="form-label">Email address</label>
<input class="form-input" id="p-email" type="email" />
</div>
<div class="form-group">
<label class="form-label">Account type</label>
<select class="form-input" id="p-type">
<option value="buyer">Buyer</option>
<option value="seller_buyer">Seller / Buyer</option>
</select>
</div>
<button class="btn btn-primary" id="save-personal-btn">Save changes</button>
</div>
</div>
<!-- Security -->
<div class="tab-panel" id="tab-security">
<div class="settings-card">
<div class="form-group">
<label class="form-label">Current password</label>
<input class="form-input" id="p-cur-pw" type="password" />
</div>
<div class="form-group">
<label class="form-label">New password</label>
<input class="form-input" id="p-new-pw" type="password" />
</div>
<div class="form-group">
<label class="form-label">Confirm new password</label>
<input class="form-input" id="p-confirm-pw" type="password" />
</div>
<button class="btn btn-primary" id="save-pw-btn">Update password</button>
</div>
</div>

<script>
/* ---- Tab switching ---- */
document.querySelectorAll('.tab-btn').forEach(btn => {
btn.addEventListener('click', function () {
document.querySelectorAll('.tab-btn')
.forEach(b => b.classList.remove('active'));
document.querySelectorAll('.tab-panel')
.forEach(p => p.classList.remove('active'));
this.classList.add('active');
document.getElementById(`tab-${this.dataset.tab}`)
.classList.add('active');
});
});
/* ---- Load current profile ---- */
initPage().then(user => {
if (!user) return;
document.getElementById('p-name').value = user.fullName;
document.getElementById('p-email').value = user.email;
document.getElementById('p-type').value = user.accountType;
document.getElementById('p-uni').value = user.university;
document.getElementById('p-campus').value= user.campus;
document.getElementById('p-student').value= user.studentNumber;
/* ---- Save personal ---- */
document.getElementById('save-personal-btn')
.addEventListener('click', async () => {
const result = await Auth.updateProfile({
id: user.id,
fullName: document.getElementById('p-name').value.trim(),
email: document.getElementById('p-email').value.trim(),
accountType: document.getElementById('p-type').value,
});
showToast(result.error
? result.error : 'Profile updated!',
result.error ? 'error' : 'success');
});
/* ---- Save password ---- */
document.getElementById('save-pw-btn')
.addEventListener('click', async () => {
const newPw = document.getElementById('p-new-pw').value;
const confirmPw = document.getElementById('p-confirm-pw').value;
if (newPw !== confirmPw) {
showToast('Passwords do not match.', 'error'); return;
}
const result = await Auth.updatePassword({
email: user.email,
currentPassword: document.getElementById('p-cur-pw').value,
newPassword: newPw,
});
showToast(result.error
? result.error : 'Password updated!',
result.error ? 'error' : 'success');
});
});
</script>
