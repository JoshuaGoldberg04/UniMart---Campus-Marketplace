<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing in - UniMart</title>
  <link rel="icon" type="image/png" sizes="any" href="../assets/unimart-icon.png?v=2">
  <link rel="shortcut icon" type="image/png" href="../assets/unimart-icon.png?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/styles.css">
</head>
<body class="auth-page">
  <article class="auth-card auth-status-card">
    <figure class="auth-logo">
      <img src="../assets/unimart-logo.png" alt="UniMart Logo" class="logo-img">
    </figure>
    <header class="auth-header">
      <h1>Signing you in</h1>
      <p id="callback-message">Please wait while UniMart finishes your Google sign-in.</p>
    </header>
    <figure class="auth-spinner" aria-hidden="true"></figure>
    <p class="form-error" id="callback-error" style="text-align:center; margin-top:16px;"></p>
  </article>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script type="module">
    // Import Auth module
    import { Auth, initializeSupabase, getSupabaseClient } from '../scripts/auth.js';
    
    // Initialize Supabase
    const _sb = initializeSupabase(window.supabase);
    window._sb = _sb;
    window.Auth = Auth;
    
    // Page code
    
    function getLandingPage(user) {
      if (user?.userRole === 'admin') return 'admin.html';
      if (user?.userRole === 'staff') return 'facility.html';
      if (user?.accountType === 'seller' || user?.accountType === 'seller_buyer') return 'dashboard.html';
      return 'search.html';
    }

    (async function finishGoogleSignIn() {
      const result = await Auth.handleOAuthCallback();
      if (result.error) {
        document.getElementById('callback-message').textContent = 'Google sign-in could not be completed.';
        document.getElementById('callback-error').textContent = result.error;
        setTimeout(() => { window.location.href = 'login.html'; }, 2500);
        return;
      }

      window.location.href = getLandingPage(result.user);
    })();
  
  </script>


</body></html>
