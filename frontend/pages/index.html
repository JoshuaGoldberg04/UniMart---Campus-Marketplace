<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="any" href="../assets/unimart-icon.png?v=2">
  <link rel="shortcut icon" type="image/png" href="../assets/unimart-icon.png?v=2">
  <title>UniMart — Campus Marketplace</title>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script type="module">
    // Import Auth module
    import { Auth, initializeSupabase, getSupabaseClient } from '../scripts/auth.js';
    
    // Initialize Supabase
    const _sb = initializeSupabase(window.supabase);
    window._sb = _sb;
    window.Auth = Auth;
    
    // Page code
    
    (async function () {
      try {
        const user = await Auth.getUser();
        if (user) {
          const role = user.userRole || 'student';
          const landingPages = {
            student: user.accountType === 'seller' ? 'dashboard.html' : 'search.html',
            staff: 'facility.html',
            admin: 'admin.html',
          };
          window.location.replace(landingPages[role] || 'search.html');
        } else {
          window.location.replace('login.html');
        }
      } catch (err) {
        console.error('Startup error:', err);
        window.location.replace('login.html');
      }
    })();
  
  </script>


</body></html>
