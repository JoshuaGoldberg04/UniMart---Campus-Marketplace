<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied - UniMart</title>
  <link rel="icon" type="image/png" sizes="any" href="../assets/unimart-icon.png?v=2">
  <link rel="shortcut icon" type="image/png" href="../assets/unimart-icon.png?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
<main class="auth-page">
  <article class="auth-card" style="text-align:center;">
    <figure class="verify-icon"><span class="ui-icon ui-icon-lg"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 2.5 16 5v4.5c0 3.55-2.42 6.78-6 7.9-3.58-1.12-6-4.35-6-7.9V5l6-2.5Z"></path><path d="M7 10h6" stroke-linecap="round"></path></svg></span></figure>
    <h1>Access denied</h1>
    <p id="access-copy" style="margin:8px 0 24px;">Your role does not have permission to open that page.</p>
    <button class="btn btn-primary btn-full" id="return-btn" type="button">Go to my workspace</button>
  </article>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script type="module">
    // Import modules
    import { Auth, initializeSupabase, getSupabaseClient } from '../scripts/auth.js';
    import * as App from '../scripts/app-modular.js';
    
    // Initialize Supabase
    const _sb = initializeSupabase(window.supabase);
    window._sb = _sb;
    window.Auth = Auth;
    window.App = App;
    
    // Page code
    
  Auth.getUser().then(user => {
    if (!user) {
      window.location.replace('login.html');
      return;
    }
    document.getElementById('return-btn').addEventListener('click', () => {
      window.location.href = getRoleLandingPage(user);
    });
  });

  </script>


</body></html>
