<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages - UniMart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/styles.css">
  <style>
    .messages-layout {
      display: grid;
      grid-template-columns: minmax(260px, 0.38fr) minmax(0, 0.62fr);
      gap: 18px;
      min-height: 620px;
    }

    .conversation-list,
    .thread-panel {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .conversation-list-header,
    .thread-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .conversation-list-header h2,
    .thread-header h2 {
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .conversation-stack {
      display: flex;
      flex-direction: column;
      max-height: 620px;
      overflow: auto;
    }

    .conversation-item {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) auto;
      gap: 12px;
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--sand);
      background: #fff;
      transition: 0.18s ease;
      cursor: pointer;
    }

    .conversation-item:hover,
    .conversation-item.active {
      background: var(--linen);
    }

    .conversation-thumb {
      width: 44px;
      height: 44px;
      border-radius: var(--radius);
      background: var(--sand);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 700;
    }

    .conversation-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .conversation-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conversation-meta,
    .conversation-date,
    .thread-subtitle {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .conversation-unread {
      min-width: 22px;
      height: 22px;
      padding: 0 7px;
      border-radius: 999px;
      background: var(--sage);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      align-self: center;
    }

    .conversation-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      align-self: center;
    }

    .conversation-delete-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid transparent;
      color: #9f3c33;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0.76;
    }

    .conversation-delete-btn:hover {
      background: #faece9;
      border-color: rgba(159, 60, 51, 0.2);
      opacity: 1;
    }

    .conversation-delete-btn svg {
      width: 17px;
      height: 17px;
    }

    .thread-panel {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .message-stack {
      flex: 1;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: auto;
      background: var(--linen);
    }

    .message-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 72%;
    }

    .message-row.mine {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message-row.theirs {
      align-self: flex-start;
    }

    .message-bubble {
      padding: 10px 12px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.45;
      background: #fff;
      border: 1px solid var(--border);
      color: var(--ink);
      word-break: break-word;
    }

    .message-row.mine .message-bubble {
      background: var(--sage);
      color: #fff;
      border-color: var(--sage);
    }

    .message-meta {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .message-compose {
      border-top: 1px solid var(--border);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message-compose-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }

    .message-count {
      color: var(--muted);
      font-size: 0.76rem;
      white-space: nowrap;
    }

    .message-count.limit {
      color: #9f3c33;
      font-weight: 700;
    }

    .thread-offers {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }

    .thread-offers:empty {
      display: none;
    }

    .offer-card,
    .booking-card-inline {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      background: var(--linen);
      display: grid;
      gap: 10px;
    }

    .offer-card-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .offer-title {
      font-weight: 800;
      color: var(--ink);
    }

    .offer-meta {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .offer-status {
      padding: 4px 9px;
      border-radius: 999px;
      background: var(--sand);
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: capitalize;
      white-space: nowrap;
    }

    .offer-status.accepted {
      background: var(--mint);
      color: var(--sage);
    }

    .offer-status.declined {
      background: #f5dddd;
      color: #9b2f2f;
    }

    .offer-actions,
    .booking-slot-grid,
    .review-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .booking-slot-grid > .form-group {
      flex: 1 1 180px;
    }

    .facility-info-inline {
      padding: 10px 12px;
      border-radius: var(--radius);
      background: #fff;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .facility-info-inline strong {
      color: var(--ink);
    }

    .review-card-inline {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      background: #fff;
      display: grid;
      gap: 10px;
    }

    .review-received-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-top: 4px;
      border-top: 1px solid var(--sand);
    }

    .btn-report {
      color: #9b2f2f;
      border-color: #ead0cc;
      background: #fff7f5;
    }

    .btn-report:hover {
      background: #f5dddd;
    }

    .review-rating-row {
      display: grid;
      grid-template-columns: minmax(120px, 0.35fr) minmax(0, 0.65fr);
      gap: 10px;
    }

    .review-stars {
      color: #b27b1a;
      font-weight: 800;
      letter-spacing: 1px;
    }

    @media (max-width: 900px) {
      .messages-layout {
        grid-template-columns: 1fr;
      }

      .message-row {
        max-width: 88%;
      }
    }
  </style>
</head>
<body>

<aside class="overlay" id="sidebar-overlay"></aside>

<section class="app-shell">
  <aside class="sidebar" id="sidebar">
    <figure class="sidebar-logo">
      <img src="../assets/unimart-logo.png" alt="UniMart Logo" class="logo-img">
    </figure>

    <nav class="sidebar-nav"></nav>

    <footer class="sidebar-footer">
      <nav class="sidebar-user dropdown" data-dropdown-trigger="user-menu">
        <figure class="user-avatar" data-user-initials="">?</figure>
        <section class="user-info">
          <span class="user-name" data-user-name="">Loading...</span>
          <span class="user-role" data-user-role=""></span>
        </section>
        <span class="user-chevron"><span class="ui-icon ui-icon-sm"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m5 7 5 6 5-6" stroke-linecap="round" stroke-linejoin="round"></path></svg></span></span>
        <nav class="dropdown-menu" id="user-menu">
          <a class="dropdown-item" href="profile.html"><span class="ui-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="7" r="3.5"></circle><path d="M3.5 16c0-3.59 2.91-6.5 6.5-6.5s6.5 2.91 6.5 6.5" stroke-linecap="round"></path></svg></span> My Profile</a>
          <section class="dropdown-divider"></section>
          <button class="dropdown-item danger" data-action="signout" type="button"><span class="ui-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 5H5.5A1.5 1.5 0 0 0 4 6.5v7A1.5 1.5 0 0 0 5.5 15H8" stroke-linecap="round"></path><path d="M11 6l4 4-4 4" stroke-linecap="round" stroke-linejoin="round"></path><path d="M15 10H8" stroke-linecap="round"></path></svg></span> Sign out</button>
        </nav>
      </nav>
    </footer>
  </aside>

  <section class="main-content">
    <header class="topbar">
      <button class="topbar-icon-btn" id="sidebar-toggle" style="display:none">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 5h14M3 10h14M3 15h14" stroke-linecap="round"></path>
        </svg>
      </button>
      <span class="topbar-title">Messages</span>
      <nav class="topbar-actions" style="margin-left:auto">
        <figure class="topbar-avatar dropdown" data-dropdown-trigger="topbar-user-menu" data-user-initials="">?</figure>
      </nav>
      <nav class="dropdown-menu" id="topbar-user-menu">
        <a class="dropdown-item" href="profile.html"><span class="ui-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="7" r="3.5"></circle><path d="M3.5 16c0-3.59 2.91-6.5 6.5-6.5s6.5 2.91 6.5 6.5" stroke-linecap="round"></path></svg></span> <span data-user-name="">My Account</span></a>
        <section class="dropdown-divider"></section>
        <button class="dropdown-item danger" data-action="signout" type="button"><span class="ui-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 5H5.5A1.5 1.5 0 0 0 4 6.5v7A1.5 1.5 0 0 0 5.5 15H8" stroke-linecap="round"></path><path d="M11 6l4 4-4 4" stroke-linecap="round" stroke-linejoin="round"></path><path d="M15 10H8" stroke-linecap="round"></path></svg></span> Sign out</button>
      </nav>
    </header>

    <main class="page-content">
      <header class="page-header">
        <h1>Messages</h1>
        <p>Manage listing conversations with buyers and sellers.</p>
      </header>

      <section class="messages-layout">
        <section class="conversation-list">
          <header class="conversation-list-header">
            <h2>Inbox</h2>
            <p class="conversation-meta" id="conversation-count">Loading conversations...</p>
          </header>
          <nav class="conversation-stack" id="conversation-stack"></nav>
        </section>

        <section class="thread-panel">
          <header class="thread-header">
            <h2 id="thread-title">Select a conversation</h2>
            <p class="thread-subtitle" id="thread-subtitle">Messages appear in chronological order.</p>
          </header>
          <section class="thread-offers" id="thread-offers"></section>
          <nav class="message-stack" id="message-stack">
            <aside class="empty-state">
              <figure class="empty-state-icon"><span class="ui-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5.5h12v8H8l-4 3v-11Z" stroke-linejoin="round"></path><path d="M7 8.5h6M7 11h4" stroke-linecap="round"></path></svg></span></figure>
              <h3>No conversation selected</h3>
              <p>Choose a thread from your inbox to read and reply.</p>
            </aside>
          </nav>
          <form class="message-compose" id="message-form">
            <textarea class="form-input" id="message-input" rows="3" maxlength="500" placeholder="Write a message..." disabled=""></textarea>
            <span class="form-error" id="message-error"></span>
            <nav class="message-compose-actions">
              <span class="message-count" id="message-count">0/500</span>
              <button class="btn btn-primary" id="send-message-btn" type="submit" disabled="">Send message</button>
            </nav>
          </form>
        </section>
      </section>
    </main>
  </section>
</section>

<aside class="toast-container" id="toast-container"></aside>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script type="module">
    // Import modules
    import { Auth, initializeSupabase, getSupabaseClient } from '../scripts/auth.js';
    import * as App from '../scripts/app-modular.js';
    
    // Initialize Supabase
    const _sb = initializeSupabase(window.supabase);
    window._sb = _sb;
    window.Auth = Auth;
    window.App = App;
    
    // Page code
    
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar-toggle').style.display = 'flex';
  }

  const state = {
    user: null,
    conversations: [],
    activeConversationId: getInitialConversationId(),
    messages: [],
    offers: [],
    transactions: [],
    reviews: [],
    facilityAvailability: null,
    messageSignature: '',
    conversationSignature: '',
    refreshTimer: null,
    hiddenConversationIds: new Set(),
  };
  const facilityAddress = '1 Jan Smuts Ave, Braamfontein, Johannesburg, 2017';
  const defaultFacilityConfig = {
    opensAt: '09:00',
    closesAt: '17:00',
    operatingDays: ['monday', 'tuesday', 'wednesday', 'thursday', 'friday'],
  };

  function getInitialConversationId() {
    const value = new URLSearchParams(window.location.search).get('conversation');
    if (!value || value === 'undefined' || value === 'null') return null;
    return value;
  }

  initPage().then(user => {
    if (!user) return;
    state.user = user;
    loadConversations({ showLoading: true, forceRender: true }).then(async () => {
      await handlePaymentReturn();
      if (state.activeConversationId) await loadMessages(state.activeConversationId, false, { forceRender: true });
      if (state.activeConversationId) openConversation(state.activeConversationId);
    });
    state.refreshTimer = setInterval(refreshActiveThread, 12000);
  });

  window.addEventListener('beforeunload', () => {
    if (state.refreshTimer) clearInterval(state.refreshTimer);
  });

  document.getElementById('message-form').addEventListener('submit', async function (event) {
    event.preventDefault();
    await submitMessage();
  });
  document.getElementById('message-input').addEventListener('input', updateMessageCount);
  updateMessageCount();

  async function handlePaymentReturn() {
    const params = new URLSearchParams(window.location.search);
    const payment = params.get('payment');
    const transactionId = params.get('transaction');
    const reference = params.get('reference') || params.get('trxref');
    if (payment !== 'success' || !transactionId) return;

    const result = await Auth.verifyPaymentCheckout({ transactionId, reference });
    if (result.error) showToast(result.error, 'error');
    else showToast('Online payment confirmed.', 'success');

    params.delete('payment');
    params.delete('transaction');
    params.delete('reference');
    params.delete('trxref');
    const nextUrl = `${window.location.pathname}${params.toString() ? `?${params}` : ''}`;
    window.history.replaceState({}, '', nextUrl);
  }

  async function loadConversations(options = {}) {
    const { showLoading = false, forceRender = false } = options;
    const stack = document.getElementById('conversation-stack');
    const count = document.getElementById('conversation-count');
    if (showLoading) {
      stack.innerHTML = '';
      count.textContent = 'Loading conversations...';
    }

    const result = await Auth.getConversations(state.user.id);
    if (result.error) {
      count.textContent = 'Unable to load inbox';
      if (showLoading || !state.conversations.length) stack.innerHTML = renderEmptyPanel(result.error);
      else showToast(result.error, 'error');
      return;
    }

    const conversations = (result.conversations || []).filter(item => !state.hiddenConversationIds.has(item.id));
    const nextSignature = conversations.map(item => `${item.id}:${item.unreadCount}:${item.lastMessageAt || ''}:${item.status}`).join('|');
    count.textContent = `${conversations.length} conversation${conversations.length === 1 ? '' : 's'}`;
    if (Auth.getUnreadMessageNotifications) {
      const unreadResult = await Auth.getUnreadMessageNotifications(state.user.id);
      if (!unreadResult.error) setUnreadMessageBadge(Number(unreadResult.total || 0));
      else setUnreadMessageBadge(conversations.reduce((total, item) => total + item.unreadCount, 0));
    } else {
      setUnreadMessageBadge(conversations.reduce((total, item) => total + item.unreadCount, 0));
    }

    if (!forceRender && nextSignature === state.conversationSignature) return;

    state.conversations = conversations;
    state.conversationSignature = nextSignature;
    count.textContent = `${state.conversations.length} conversation${state.conversations.length === 1 ? '' : 's'}`;
    renderConversations();
  }

  function renderConversations() {
    const stack = document.getElementById('conversation-stack');
    if (!state.conversations.length) {
      stack.innerHTML = renderEmptyPanel('Start a conversation from a marketplace listing and it will appear here.');
      return;
    }

    stack.innerHTML = state.conversations.map(conversation => `
      <article class="conversation-item ${conversation.id === state.activeConversationId ? 'active' : ''}" role="button" tabindex="0" data-conversation-id="${escapeAttribute(conversation.id)}" aria-label="Open ${escapeAttribute(conversation.listingTitle)} conversation">
        <section class="conversation-thumb">
          ${conversation.listingImageUrl ? `<img src="${escapeAttribute(conversation.listingImageUrl)}" alt="${escapeAttribute(conversation.listingTitle)}" />` : 'Item'}
        </section>
        <section>
          <section class="conversation-title">${escapeHtml(conversation.listingTitle)}</section>
          <section class="conversation-meta">${conversation.role === 'buyer' ? 'Seller' : 'Buyer'}: ${escapeHtml(conversation.otherDisplayName || shortId(conversation.otherUserId))}</section>
          <section class="conversation-date">${formatDateTime(conversation.lastMessageAt)}</section>
        </section>
        <nav class="conversation-actions" aria-label="Conversation actions">
          ${conversation.unreadCount ? `<span class="conversation-unread">${conversation.unreadCount > 99 ? '99+' : conversation.unreadCount}</span>` : ''}
          <button class="conversation-delete-btn" type="button" data-delete-conversation="${escapeAttribute(conversation.id)}" aria-label="Delete ${escapeAttribute(conversation.listingTitle)} conversation">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M4.5 6h11" stroke-linecap="round"/>
              <path d="M8 6V4.5h4V6" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6.5 8.25 7 16h6l.5-7.75" stroke-linejoin="round"/>
              <path d="M9 9.5v4M11 9.5v4" stroke-linecap="round"/>
            </svg>
          </button>
        </nav>
      </article>
    `).join('');

    stack.querySelectorAll('[data-conversation-id]').forEach(item => {
      item.addEventListener('click', event => {
        if (event.target.closest('[data-delete-conversation]')) return;
        openConversation(item.dataset.conversationId);
      });
      item.addEventListener('keydown', event => {
        if (event.target.closest('[data-delete-conversation]')) return;
        if (event.key !== 'Enter' && event.key !== ' ') return;
        event.preventDefault();
        openConversation(item.dataset.conversationId);
      });
    });

    stack.querySelectorAll('[data-delete-conversation]').forEach(button => {
      button.addEventListener('click', deleteConversationFromInbox);
    });
  }

  async function deleteConversationFromInbox(event) {
    event.preventDefault();
    event.stopPropagation();
    const conversationId = event.currentTarget.dataset.deleteConversation;
    const conversation = state.conversations.find(item => item.id === conversationId);
    if (!conversation) return;

    const confirmed = window.confirm(`Delete your conversation about "${conversation.listingTitle}"? This will remove it from your inbox.`);
    if (!confirmed) return;

    state.hiddenConversationIds.add(conversationId);
    state.conversations = state.conversations.filter(item => item.id !== conversationId);
    if (state.activeConversationId === conversationId) {
      state.activeConversationId = null;
      window.__unimartActiveConversationId = null;
      document.getElementById('thread-title').textContent = 'Select a conversation';
      document.getElementById('thread-subtitle').textContent = 'Messages appear in chronological order.';
      document.getElementById('thread-offers').innerHTML = '';
      document.getElementById('message-stack').innerHTML = renderEmptyPanel('Choose another conversation to continue messaging.');
      document.getElementById('message-input').disabled = true;
      document.getElementById('send-message-btn').disabled = true;
    }
    state.conversationSignature = '';
    document.getElementById('conversation-count').textContent = `${state.conversations.length} conversation${state.conversations.length === 1 ? '' : 's'}`;
    setUnreadMessageBadge(state.conversations.reduce((total, item) => total + item.unreadCount, 0));
    renderConversations();
    showToast('Conversation deleted from your inbox', 'success');

    event.currentTarget.disabled = true;
    const result = await Auth.deleteConversationForUser({ conversationId, userId: state.user.id });
    event.currentTarget.disabled = false;

    if (result.error) showToast(result.error, 'error');
  }

  function updateMessageCount() {
    const input = document.getElementById('message-input');
    const count = document.getElementById('message-count');
    if (!input || !count) return;
    const max = Number(input.getAttribute('maxlength')) || 500;
    count.textContent = `${input.value.length}/${max}`;
    count.classList.toggle('limit', input.value.length >= max);
  }

  function updateTextareaCount(event) {
    const input = event.currentTarget;
    const count = input.parentElement?.querySelector('.message-count');
    if (!input || !count) return;
    const max = Number(input.getAttribute('maxlength')) || 0;
    if (!max) return;
    count.textContent = `${input.value.length}/${max}`;
    count.classList.toggle('limit', input.value.length >= max);
  }

  async function openConversation(conversationId) {
    if (!conversationId || conversationId === 'undefined' || conversationId === 'null') return;
    state.activeConversationId = conversationId;
    window.__unimartActiveConversationId = conversationId;
    const conversation = state.conversations.find(item => item.id === conversationId);
    if (conversation) {
      document.getElementById('thread-title').textContent = conversation.listingTitle;
      document.getElementById('thread-subtitle').textContent = `${conversation.role === 'buyer' ? 'Conversation with seller' : 'Conversation with buyer'} ${conversation.otherDisplayName || shortId(conversation.otherUserId)}`;
    }

    document.getElementById('message-input').disabled = false;
    document.getElementById('send-message-btn').disabled = false;
    renderConversations();
    state.messageSignature = '';
    await loadMessages(conversationId, true, { showLoading: true, forceRender: true });
    await loadConversations({ forceRender: true });
  }

  async function loadMessages(conversationId, markRead, options = {}) {
    const { showLoading = false, forceRender = false } = options;
    const stack = document.getElementById('message-stack');
    if (showLoading) stack.innerHTML = renderEmptyPanel('Loading messages...');

    const result = await Auth.getConversationMessages({ conversationId, userId: state.user.id, markRead });
    if (result.error) {
      if (showLoading || !state.messages.length) stack.innerHTML = renderEmptyPanel(result.error);
      else showToast(result.error, 'error');
      return;
    }

    const messages = result.messages || [];
    const offers = result.offers || [];
    const transactions = result.transactions || [];
    const reviews = result.reviews || [];
    const offerSignature = offers.map(offer => `${offer.id}:${offer.status}:${offer.updatedAt || ''}`).join('|');
    const transactionSignature = transactions.map(transaction => `${transaction.id}:${transaction.status}:${transaction.facilityBookingId || ''}`).join('|');
    const reviewSignature = reviews.map(review => `${review.id}:${review.rating}:${review.status}:${review.createdAt || ''}`).join('|');
    const nextSignature = `${messages.map(message => `${message.id}:${message.createdAt}:${message.readAt || ''}`).join('|')}::${offerSignature}::${transactionSignature}::${reviewSignature}`;
    document.getElementById('thread-title').textContent = result.conversation.listingTitle;
    document.getElementById('thread-subtitle').textContent = `${result.conversation.role === 'buyer' ? 'Conversation with seller' : 'Conversation with buyer'} ${result.conversation.otherDisplayName || shortId(result.conversation.otherUserId)}`;

    if (!forceRender && nextSignature === state.messageSignature) return;

    const nearBottom = stack.scrollHeight - stack.scrollTop - stack.clientHeight < 80;
    state.messages = messages;
    state.offers = offers;
    state.transactions = transactions;
    state.reviews = reviews;
    state.messageSignature = nextSignature;
    renderOfferPanel(result.conversation);

    if (!state.messages.length) {
      stack.innerHTML = renderEmptyPanel('No messages in this thread yet.');
      return;
    }

    stack.innerHTML = state.messages.map(renderMessage).join('');
    if (nearBottom || forceRender) stack.scrollTop = stack.scrollHeight;
  }

  function renderOfferPanel(conversation) {
    const wrap = document.getElementById('thread-offers');
    const latestOffer = state.offers[0];
    const acceptedOfferIds = new Set(state.offers.filter(item => item.status === 'accepted').map(item => item.id));
    const acceptedTransaction = state.transactions.find(item => ['accepted', 'facility_booked', 'completed'].includes(item.status) && acceptedOfferIds.has(item.offerId));

    if (!latestOffer && !acceptedTransaction) {
      wrap.innerHTML = '';
      return;
    }

    const offerHtml = latestOffer ? renderOfferCard(latestOffer, conversation) : '';
    const paymentHtml = acceptedTransaction && latestOffer?.status === 'accepted' ? renderPaymentCard(acceptedTransaction) : '';
    const bookingHtml = acceptedTransaction
      ? renderBookingCard(acceptedTransaction)
      : '';
    const reviewHtml = acceptedTransaction && ['facility_booked', 'completed'].includes(acceptedTransaction.status)
      ? renderReviewCard(acceptedTransaction, conversation)
      : '';
    wrap.innerHTML = `${offerHtml}${paymentHtml}${bookingHtml}${reviewHtml}`;
    if (acceptedTransaction) ensureFacilityInfo();

    wrap.querySelectorAll('[data-offer-action]').forEach(button => {
      button.addEventListener('click', () => respondToOffer(button));
    });
    const sellerDropoffButton = document.getElementById('set-seller-dropoff-btn');
    if (sellerDropoffButton) {
      sellerDropoffButton.addEventListener('click', setSellerDropoff);
      loadSellerDropoffSlots();
    }
    const buyerCollectionButton = document.getElementById('confirm-collection-btn');
    if (buyerCollectionButton) {
      buyerCollectionButton.addEventListener('click', confirmBuyerCollection);
      loadBuyerCollectionSlots(acceptedTransaction);
    }
    const paymentButton = document.getElementById('start-payment-btn');
    if (paymentButton) paymentButton.addEventListener('click', startOnlinePayment);
    const reviewButton = document.getElementById('submit-review-btn');
    if (reviewButton) reviewButton.addEventListener('click', submitReview);
    const reviewBody = document.getElementById('review-body');
    if (reviewBody) {
      reviewBody.addEventListener('input', updateTextareaCount);
      updateTextareaCount({ currentTarget: reviewBody });
    }
    wrap.querySelectorAll('[data-report-review]').forEach(button => {
      button.addEventListener('click', () => reportReview(button.dataset.reportReview));
    });
  }

  function renderPaymentCard(transaction) {
    if (!transaction.amount || transaction.amount <= 0) {
      return `
        <section class="booking-card-inline">
          <section class="offer-title">Payment</section>
          <section class="offer-meta">This trade does not have an online payment amount.</section>
        </section>
      `;
    }

    const paid = Number(transaction.onlinePaidAmount || 0);
    const cashDue = Number(transaction.cashDueAmount || Math.max(0, transaction.amount - paid));
    const canPay = state.user.id === transaction.buyerId && !['paid', 'completed'].includes(transaction.paymentStatus);
    const paymentDone = ['paid', 'partial_paid'].includes(transaction.paymentStatus) || paid > 0;
    return `
      <section class="booking-card-inline">
        <section>
          <section class="offer-title">Payment plan</section>
          <section class="offer-meta">Accepted amount: ${formatCurrency(transaction.amount)}. Online: ${formatCurrency(paid)}. Cash due at collection: ${formatCurrency(cashDue)}.</section>
          <section class="offer-meta">Status: ${escapeHtml(formatStatusLabel(transaction.paymentStatus || 'unpaid'))}${cashDue > 0 ? '. Staff will confirm the cash balance before release.' : ''}${paymentDone ? ' You can continue with the trade facility handover.' : ''}</section>
        </section>
        ${canPay ? `
          <section class="booking-slot-grid">
            <section class="form-group">
              <label class="form-label" for="online-payment-amount">Pay online now</label>
              <input class="form-input" id="online-payment-amount" type="number" min="1" max="${escapeAttribute(transaction.amount)}" step="1" value="${escapeAttribute(transaction.amount)}" />
            </section>
          </section>
          <span class="form-error" id="payment-error"></span>
          <button class="btn btn-primary" id="start-payment-btn" data-transaction-id="${escapeAttribute(transaction.id)}" type="button">Pay online</button>
        ` : ''}
      </section>
    `;
  }

  function renderOfferCard(offer, conversation) {
    const canRespond = state.user.id === offer.sellerId && offer.status === 'pending';
    const isBuyer = state.user.id === offer.buyerId;
    const amount = offer.amount === null ? 'Trade offer' : formatCurrency(offer.amount);
    const note = formatOfferNote(offer);
    return `
      <section class="offer-card">
        <section class="offer-card-header">
          <section>
            <section class="offer-title">${escapeHtml(amount)}</section>
            ${note ? `<section class="offer-meta">${escapeHtml(note)}</section>` : ''}
            ${offer.status === 'pending' && isBuyer ? '<section class="offer-meta">Waiting for the seller to accept or decline this offer.</section>' : ''}
            ${offer.status === 'pending' && canRespond ? '<section class="offer-meta">Respond to this offer to continue the transaction.</section>' : ''}
          </section>
          <span class="offer-status ${escapeAttribute(offer.status)}">${escapeHtml(offer.status)}</span>
        </section>
        ${canRespond ? `
          <section class="offer-actions">
            <button class="btn btn-primary" type="button" data-offer-action="accepted" data-offer-id="${escapeAttribute(offer.id)}">Accept offer</button>
            <button class="btn btn-secondary" type="button" data-offer-action="declined" data-offer-id="${escapeAttribute(offer.id)}">Decline</button>
          </section>
        ` : ''}
      </section>
    `;
  }

  function formatOfferNote(offer) {
    const note = String(offer.note || '').trim();
    if (!note) return '';
    if (offer.amount === null || offer.amount === undefined) return note;
    const amount = Number(offer.amount);
    const plainAmount = String(Math.trunc(amount));
    const flexibleAmount = plainAmount.split('').join('[\\s,]*');
    const pricePrefix = new RegExp(`^(?:R|ZAR)?\\s*${flexibleAmount}(?:\\.\\d{1,2})?\\s*-?\\s*`, 'i');
    return note.replace(pricePrefix, '').trim();
  }

  function renderBookingCard(transaction) {
    const booking = transaction.facilityBooking || {};
    const hasDropoff = Boolean(booking.dropoffScheduledAt);
    const hasCollection = Boolean(booking.collectionScheduledAt);

    if (transaction.facilityBookingId && hasCollection) {
      return `
        <section class="booking-card-inline">
          <section class="offer-title">Trade facility handover booked</section>
          <section class="offer-meta">Shared handover time: ${escapeHtml(formatSlot(booking.dropoffScheduledAt))}.</section>
          <section class="offer-meta">${state.user.id === transaction.buyerId ? 'Meet the seller at this time to complete the transfer. Bring proof of identity.' : 'Meet the buyer at this time to complete the transfer.'}</section>
          ${renderFacilityInfo()}
        </section>
      `;
    }

    if (!transaction.facilityBookingId && state.user.id === transaction.buyerId) {
      return `
        <section class="booking-card-inline">
          <section class="offer-title">Waiting for seller drop-off time</section>
          <section class="offer-meta">Payment does not complete the handover. The seller still needs to choose the shared trade facility handover time.</section>
          ${renderFacilityInfo()}
        </section>
      `;
    }

    if (!transaction.facilityBookingId && state.user.id === transaction.sellerId) {
      return `
        <section class="booking-card-inline">
          <section>
            <section class="offer-title">Choose your drop-off time</section>
            <section class="offer-meta">Pick the shared time when you and the buyer will meet at the trade facility to complete the transfer.</section>
            ${renderFacilityInfo()}
          </section>
          <section class="booking-slot-grid">
            <section class="form-group">
              <label class="form-label" for="handover-dropoff-slot">Shared handover time</label>
              <select class="form-input" id="handover-dropoff-slot"></select>
            </section>
          </section>
          <span class="form-error" id="handover-booking-error"></span>
          <button class="btn btn-primary" id="set-seller-dropoff-btn" data-transaction-id="${escapeAttribute(transaction.id)}" type="button">Set handover time</button>
        </section>
      `;
    }

    if (transaction.facilityBookingId && hasDropoff && !hasCollection && state.user.id === transaction.buyerId) {
      return `
        <section class="booking-card-inline">
          <section>
            <section class="offer-title">Choose your collection time</section>
            <section class="offer-meta">Seller drop-off is set for ${escapeHtml(formatSlot(booking.dropoffScheduledAt))}. Choose when you will collect the item.</section>
            ${renderFacilityInfo()}
          </section>
          <section class="booking-slot-grid">
            <section class="form-group">
              <label class="form-label" for="handover-collection-slot">Your collection time</label>
              <select class="form-input" id="handover-collection-slot"></select>
            </section>
          </section>
          <span class="form-error" id="handover-booking-error"></span>
          <button class="btn btn-primary" id="confirm-collection-btn" data-transaction-id="${escapeAttribute(transaction.id)}" data-booking-id="${escapeAttribute(transaction.facilityBookingId)}" type="button">Confirm collection time</button>
        </section>
      `;
    }

    if (transaction.facilityBookingId && hasDropoff && !hasCollection) {
      return `
        <section class="booking-card-inline">
          <section class="offer-title">Waiting for buyer collection time</section>
          <section class="offer-meta">Your drop-off is set for ${escapeHtml(formatSlot(booking.dropoffScheduledAt))}. The buyer now needs to choose collection.</section>
          ${renderFacilityInfo()}
        </section>
      `;
    }

    return `
      <section class="booking-card-inline">
        <section>
          <section class="offer-title">Trade facility handover</section>
          <section class="offer-meta">This handover is waiting for the next scheduling step.</section>
          ${renderFacilityInfo()}
        </section>
      </section>
    `;
  }

  function renderFacilityInfo() {
    return `
      <section class="facility-info-inline" data-facility-info>
        <strong>Trade facility:</strong> ${escapeHtml(facilityAddress)}<br />
        <strong>Hours:</strong> ${escapeHtml(formatFacilityHours(getFacilityConfig()))}
      </section>
    `;
  }

  async function ensureFacilityInfo() {
    if (state.facilityAvailability?.config) {
      updateFacilityInfoBlocks();
      return;
    }
    const result = await Auth.getFacilityAvailability();
    if (!result.error) {
      state.facilityAvailability = result;
      updateFacilityInfoBlocks();
    }
  }

  function updateFacilityInfoBlocks() {
    document.querySelectorAll('[data-facility-info]').forEach(block => {
      block.innerHTML = `
        <strong>Trade facility:</strong> ${escapeHtml(facilityAddress)}<br />
        <strong>Hours:</strong> ${escapeHtml(formatFacilityHours(getFacilityConfig()))}
      `;
    });
  }

  function getFacilityConfig() {
    return state.facilityAvailability?.config || defaultFacilityConfig;
  }

  function renderReviewCard(transaction, conversation) {
    const revieweeId = state.user.id === transaction.buyerId ? transaction.sellerId : transaction.buyerId;
    const existingReview = state.reviews.find(review => review.transactionId === transaction.id && review.reviewerId === state.user.id);
    const receivedReview = state.reviews.find(review => review.transactionId === transaction.id && review.revieweeId === state.user.id && review.status === 'visible');

    return `
      <section class="review-card-inline">
        <section>
          <section class="offer-title">Rate this handover</section>
          <section class="offer-meta">Reviews help students know who they can trust for future trades.</section>
        </section>
        ${existingReview ? `
          <section class="offer-meta">
            Your review: <span class="review-stars">${escapeHtml(formatRating(existingReview.rating))}</span>
            ${existingReview.body ? ` - ${escapeHtml(existingReview.body)}` : ''}
          </section>
        ` : `
          <section class="review-rating-row">
            <section class="form-group">
              <label class="form-label" for="review-rating">Rating</label>
              <select class="form-input" id="review-rating">
                <option value="5">5 stars</option>
                <option value="4">4 stars</option>
                <option value="3">3 stars</option>
                <option value="2">2 stars</option>
                <option value="1">1 star</option>
              </select>
            </section>
            <section class="form-group">
              <label class="form-label" for="review-body">Review</label>
              <textarea class="form-input" id="review-body" rows="2" maxlength="180" placeholder="How did the handover go?"></textarea>
              <span class="message-count">0/180</span>
            </section>
          </section>
          <span class="form-error" id="review-error"></span>
          <section class="review-actions">
            <button class="btn btn-primary" id="submit-review-btn" data-transaction-id="${escapeAttribute(transaction.id)}" data-reviewee-id="${escapeAttribute(revieweeId)}" type="button">Submit review</button>
          </section>
        `}
        ${receivedReview ? `
          <section class="review-received-row">
            <section class="offer-meta">
              Review received: <span class="review-stars">${escapeHtml(formatRating(receivedReview.rating))}</span>
              ${receivedReview.body ? ` - ${escapeHtml(receivedReview.body)}` : ''}
            </section>
            <button class="btn btn-secondary btn-report" type="button" data-report-review="${escapeAttribute(receivedReview.id)}">Report review</button>
          </section>
        ` : ''}
      </section>
    `;
  }

  async function submitMessage() {
    const input = document.getElementById('message-input');
    const error = document.getElementById('message-error');
    const button = document.getElementById('send-message-btn');
    const body = input.value.trim();
    error.textContent = '';

    if (!state.activeConversationId) {
      error.textContent = 'Choose a conversation before sending.';
      return;
    }
    if (!body) {
      error.textContent = 'Message cannot be empty.';
      return;
    }

    button.disabled = true;
    button.textContent = 'Sending...';

    const result = await Auth.sendMessage({
      conversationId: state.activeConversationId,
      senderId: state.user.id,
      body,
    });

    button.disabled = false;
    button.textContent = 'Send message';

    if (result.error) {
      error.textContent = result.error;
      return;
    }

    input.value = '';
    updateMessageCount();
    await loadMessages(state.activeConversationId, false, { forceRender: true });
    await loadConversations({ forceRender: true });
  }

  async function respondToOffer(button) {
    const originalText = button.textContent;
    button.disabled = true;
    button.textContent = 'Saving...';
    const result = await Auth.updateOfferStatus({
      offerId: button.dataset.offerId,
      userId: state.user.id,
      status: button.dataset.offerAction,
    });
    button.disabled = false;
    button.textContent = originalText;

    if (result.error) {
      showToast(result.error, 'error');
      return;
    }

    showToast(button.dataset.offerAction === 'accepted' ? 'Offer accepted' : 'Offer declined', 'success');
    await loadMessages(state.activeConversationId, false, { forceRender: true });
    await loadConversations({ forceRender: true });
  }

  async function startOnlinePayment() {
    const button = document.getElementById('start-payment-btn');
    const input = document.getElementById('online-payment-amount');
    const error = document.getElementById('payment-error');
    const transaction = state.transactions.find(item => item.id === button?.dataset.transactionId);
    if (!button || !input || !transaction) return;

    const amount = Number(input.value);
    error.textContent = '';
    if (!Number.isFinite(amount) || amount <= 0 || amount > Number(transaction.amount || 0)) {
      error.textContent = 'Enter an online amount up to the accepted offer amount.';
      return;
    }

    button.disabled = true;
    const originalText = button.textContent;
    button.textContent = 'Starting payment...';
    const result = await Auth.createPaymentCheckout({
      transactionId: transaction.id,
      buyerId: state.user.id,
      onlineAmount: amount,
    });
    button.disabled = false;
    button.textContent = originalText;

    if (result.error) {
      error.textContent = result.error;
      return;
    }
    if (result.checkoutUrl) {
      window.location.href = result.checkoutUrl;
      return;
    }
    showToast(result.message || 'Payment plan saved. Online checkout is not connected yet.', 'success');
    await loadMessages(state.activeConversationId, false, { forceRender: true });
  }

  async function loadSellerDropoffSlots() {
    const button = document.getElementById('set-seller-dropoff-btn');
    const error = document.getElementById('handover-booking-error');
    if (!button) return;
    button.disabled = true;
    button.textContent = 'Loading slots...';
    const result = await Auth.getFacilityAvailability();
    if (result.error) {
      error.textContent = result.error;
      populateSlotSelect(document.getElementById('handover-dropoff-slot'), [], 'No handover slots available');
      button.textContent = 'Set handover time';
      return;
    }
    state.facilityAvailability = result;
    populateSlotSelect(document.getElementById('handover-dropoff-slot'), result.dropoffSlots || [], 'No handover slots available');
    button.disabled = !document.getElementById('handover-dropoff-slot')?.value;
    button.textContent = 'Set handover time';
  }

  async function loadBuyerCollectionSlots(transaction) {
    const button = document.getElementById('confirm-collection-btn');
    const error = document.getElementById('handover-booking-error');
    const dropoffValue = transaction?.facilityBooking?.dropoffScheduledAt;
    if (!button || !dropoffValue) return;
    button.disabled = true;
    button.textContent = 'Loading slots...';
    const result = await Auth.getFacilityAvailability();
    if (result.error) {
      error.textContent = result.error;
      populateSlotSelect(document.getElementById('handover-collection-slot'), [], 'No collection slots available');
      button.textContent = 'Confirm collection time';
      return;
    }
    state.facilityAvailability = result;
    const availability = result;
    const dropoffTime = new Date(dropoffValue).getTime();
    const collectionSlots = (availability.collectionSlots || []).filter(slot => {
      return slot.available > 0 && (!dropoffTime || new Date(slot.startsAt).getTime() > dropoffTime);
    });
    populateSlotSelect(document.getElementById('handover-collection-slot'), collectionSlots, 'No later collection slots available');
    button.disabled = !collectionSlots.length;
    button.textContent = 'Confirm collection time';
  }

  function populateSlotSelect(select, slots, emptyLabel) {
    if (!select) return;
    const availableSlots = (slots || []).filter(slot => slot.available > 0);
    select.innerHTML = availableSlots.length
      ? availableSlots.slice(0, 30).map(slot => `<option value="${escapeAttribute(slot.startsAt)}">${escapeHtml(formatSlot(slot.startsAt))} (${slot.available} open)</option>`).join('')
      : `<option value="">${escapeHtml(emptyLabel)}</option>`;
    select.disabled = !availableSlots.length;
  }

  async function setSellerDropoff() {
    const transaction = state.transactions.find(item => item.status === 'accepted' && !item.facilityBookingId && item.sellerId === state.user.id);
    const error = document.getElementById('handover-booking-error');
    const button = document.getElementById('set-seller-dropoff-btn');
    const dropoffScheduledAt = document.getElementById('handover-dropoff-slot')?.value;
    error.textContent = '';

    if (!transaction || !dropoffScheduledAt) {
      error.textContent = 'Choose the shared handover time.';
      return;
    }

    button.disabled = true;
    button.textContent = 'Saving...';
    const result = await Auth.createFacilityBooking({
      transactionId: transaction.id,
      listingId: transaction.listingId,
      actorId: state.user.id,
      dropoffScheduledAt,
      collectionScheduledAt: dropoffScheduledAt,
    });
    button.textContent = 'Set handover time';

    if (result.error) {
      button.disabled = false;
      error.textContent = result.error;
      return;
    }

    showToast('Handover time set', 'success');
    await loadMessages(state.activeConversationId, false, { forceRender: true });
  }

  async function confirmBuyerCollection() {
    const button = document.getElementById('confirm-collection-btn');
    const transaction = state.transactions.find(item => item.id === button?.dataset.transactionId && item.buyerId === state.user.id);
    const error = document.getElementById('handover-booking-error');
    const collectionScheduledAt = document.getElementById('handover-collection-slot')?.value;
    error.textContent = '';

    if (!transaction || !collectionScheduledAt) {
      error.textContent = 'Choose your collection time.';
      return;
    }

    button.disabled = true;
    button.textContent = 'Saving...';
    const result = await Auth.confirmFacilityCollection({
      transactionId: transaction.id,
      bookingId: button.dataset.bookingId,
      buyerId: state.user.id,
      collectionScheduledAt,
    });
    button.textContent = 'Confirm collection time';

    if (result.error) {
      button.disabled = false;
      error.textContent = result.error;
      return;
    }

    showToast('Collection time confirmed', 'success');
    await loadMessages(state.activeConversationId, false, { forceRender: true });
  }

  async function submitReview() {
    const button = document.getElementById('submit-review-btn');
    const error = document.getElementById('review-error');
    const transaction = state.transactions.find(item => item.id === button?.dataset.transactionId);
    if (!button || !transaction) return;

    error.textContent = '';
    button.disabled = true;
    button.textContent = 'Submitting...';

    const result = await Auth.createReview({
      transactionId: transaction.id,
      reviewerId: state.user.id,
      revieweeId: button.dataset.revieweeId,
      listingId: transaction.listingId,
      rating: document.getElementById('review-rating')?.value,
      body: document.getElementById('review-body')?.value.trim(),
    });

    button.disabled = false;
    button.textContent = 'Submit review';

    if (result.error) {
      error.textContent = result.error;
      return;
    }

    showToast('Review submitted', 'success');
    await loadMessages(state.activeConversationId, false, { forceRender: true });
  }

  async function reportReview(reviewId) {
    const reason = window.prompt('Why are you reporting this review?');
    if (!reason || !reason.trim()) return;
    const review = state.reviews.find(item => item.id === reviewId);
    const result = await Auth.reportContent({
      reporterId: state.user.id,
      targetType: 'review',
      targetId: reviewId,
      listingId: review?.listingId || null,
      reason: reason.trim(),
    });
    if (result.error) {
      showToast(result.error, 'error');
      return;
    }
    showToast('Review reported', 'success');
  }

  async function refreshActiveThread() {
    if (!state.user || !state.activeConversationId) return;
    await loadMessages(state.activeConversationId, true);
    await loadConversations();
  }

  function renderMessage(message) {
    const mine = message.senderId === state.user.id;
    return `
      <section class="message-row ${mine ? 'mine' : 'theirs'}">
        <section class="message-meta">${mine ? 'You' : 'Them'} - ${formatDateTime(message.createdAt)}</section>
        <section class="message-bubble">${escapeHtml(message.body)}</section>
      </section>
    `;
  }

  function renderEmptyPanel(message) {
    return `
      <section class="empty-state">
        <section class="empty-state-icon"><span class="ui-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5.5h12v8H8l-4 3v-11Z" stroke-linejoin="round"/><path d="M7 8.5h6M7 11h4" stroke-linecap="round"/></svg></span></section>
        <h3>${escapeHtml(message)}</h3>
      </section>
    `;
  }

  function shortId(value) {
    if (!value) return 'Unknown';
    return `${value.slice(0, 8)}...`;
  }

  function formatDateTime(value) {
    if (!value) return 'No activity yet';
    return new Intl.DateTimeFormat('en-ZA', {
      day: 'numeric',
      month: 'short',
      hour: '2-digit',
      minute: '2-digit',
    }).format(new Date(value));
  }

  function formatCurrency(value) {
    return new Intl.NumberFormat('en-ZA', {
      style: 'currency',
      currency: 'ZAR',
      maximumFractionDigits: 0,
    }).format(value || 0);
  }

  function formatSlot(value) {
    return new Intl.DateTimeFormat('en-ZA', {
      weekday: 'short',
      day: 'numeric',
      month: 'short',
      hour: '2-digit',
      minute: '2-digit',
    }).format(new Date(value));
  }

  function formatFacilityHours(config = defaultFacilityConfig) {
    const dayLabels = {
      monday: 'Mon',
      tuesday: 'Tue',
      wednesday: 'Wed',
      thursday: 'Thu',
      friday: 'Fri',
      saturday: 'Sat',
      sunday: 'Sun',
    };
    const days = (config.operatingDays || defaultFacilityConfig.operatingDays)
      .map(day => dayLabels[String(day).toLowerCase()] || day)
      .join(', ');
    return `${days}, ${config.opensAt || defaultFacilityConfig.opensAt}-${config.closesAt || defaultFacilityConfig.closesAt}`;
  }

  function formatRating(rating) {
    const count = Math.max(0, Math.min(5, Number(rating) || 0));
    return `${count}/5`;
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escapeAttribute(value) {
    return escapeHtml(value);
  }

  </script>
